server {
    listen 80;
    server_name vibeforge.hydra.net.au;

    # Stub status for health container (internal Docker network only)
    location = /nginx_status {
        stub_status;
        allow 172.16.0.0/12;
        deny all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name vibeforge.hydra.net.au;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy no-referrer-when-downgrade;

    # SSE endpoint — disable buffering, longer timeout
    location /api/v2/projects/ {
        # Match SSE events paths and regular API
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE needs buffering off and long read timeout
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
    }

    # Nginx stub_status — internal only (health container queries this)
    location = /nginx_status {
        stub_status;
        allow 172.16.0.0/12;  # Docker network
        deny all;
    }

    # Health dashboard — proxied through nginx
    location /health-dashboard/ {
        proxy_pass http://health:9090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    location /api/health/ {
        proxy_pass http://health:9090/api/health/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Forgejo (VF-232) — board-hosted git engine
    # Pure reverse proxy at first ship; auth shim (VF-236) adds auth_request later.
    location /git/ {
        proxy_pass         http://forgejo:3000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        client_max_body_size 512M;
        proxy_read_timeout   600s;
        proxy_send_timeout   600s;
        proxy_buffering     off;
        proxy_request_buffering off;
    }

    # Vaultwarden (VF-233) — adjacent credential vault, master password owned by user
    # NOTE: no trailing slash on proxy_pass — Vaultwarden expects the /vault prefix preserved
    # because DOMAIN is set to https://.../vault (Vaultwarden routes are /vault/* internally).
    location /vault/ {
        proxy_pass         http://vaultwarden:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        client_max_body_size 128M;
    }

    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
