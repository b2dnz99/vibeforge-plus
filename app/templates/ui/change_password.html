<!DOCTYPE html>
<html lang="en">
<script>(function(){try{var p=JSON.parse(localStorage.getItem('vf-theme')||'{}');if(p.dark)document.documentElement.setAttribute('data-theme','dark');else document.documentElement.setAttribute('data-theme','light');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})()</script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibeForge+ — Change Password</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:linear-gradient(145deg,#0f172a,#1e1b4b);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;color:#e2e8f0}
  [data-theme="light"] body{background:linear-gradient(145deg,#f8fafc,#e2e8f0)}

  .card{width:100%;max-width:440px;background:rgba(15,23,42,0.9);backdrop-filter:blur(20px);border-radius:16px;box-shadow:0 8px 48px rgba(0,0,0,0.5),0 0 80px rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.2);overflow:hidden}
  [data-theme="light"] .card{background:rgba(255,255,255,0.95);border-color:rgba(245,158,11,0.15)}

  .topbar{height:3px;background:linear-gradient(90deg,transparent,#f59e0b,#7c3aed,#f59e0b,transparent)}

  .header{padding:2rem 2rem 0.75rem;text-align:center}
  .header h1{font-size:1.2rem;font-weight:700;color:#f59e0b;margin-bottom:0.3rem}
  .header p{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:#94a3b8;line-height:1.5}
  [data-theme="light"] .header p{color:#64748b}

  .body{padding:0.75rem 2rem 2rem}

  .field{margin-bottom:0.75rem}
  .field label{font-family:'JetBrains Mono',monospace;font-size:0.6rem;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:#f59e0b;display:block;margin-bottom:0.3rem}
  .pw-row{display:flex;align-items:center;gap:0.6rem}
  .pw-row input{flex:1;padding:0.6rem 0.75rem;border-radius:8px;border:1px solid rgba(245,158,11,0.2);background:rgba(15,23,42,0.6);font-family:'JetBrains Mono',monospace;font-size:0.85rem;color:#e2e8f0;outline:none}
  .pw-row input:focus{border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,0.15)}
  .pw-row input::placeholder{color:#475569}
  [data-theme="light"] .pw-row input{background:rgba(248,250,252,0.8);border-color:rgba(245,158,11,0.15);color:#1e293b}
  .pw-row input::-ms-reveal,.pw-row input::-webkit-credentials-auto-fill-button{display:none !important}
  .pw-peek{background:none;border:none;cursor:pointer;font-size:1.2rem;color:#f59e0b;opacity:0.4;transition:opacity 0.15s;flex-shrink:0;filter:drop-shadow(0 0 3px rgba(245,158,11,0.3))}

  .hint{font-family:'JetBrains Mono',monospace;font-size:0.55rem;color:#475569;margin-top:0.2rem}

  .save-btn{width:100%;padding:0.65rem;border:none;border-radius:8px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.05em;cursor:pointer;transition:all 0.2s;margin-top:0.75rem}
  .save-btn:hover{box-shadow:0 4px 20px rgba(245,158,11,0.4)}
  .save-btn:disabled{opacity:0.5;cursor:not-allowed}

  .msg{font-family:'JetBrains Mono',monospace;font-size:0.7rem;text-align:center;margin-top:0.75rem;min-height:1rem;padding:0.3rem;border-radius:6px;display:none}
  .msg.ok{display:block;background:rgba(16,185,129,0.08);color:#10b981;border:1px solid rgba(16,185,129,0.15)}
  .msg.err{display:block;background:rgba(239,68,68,0.08);color:#ef4444;border:1px solid rgba(239,68,68,0.15)}
</style>
</head>
<body>
<div class="card">
  <div class="topbar"></div>
  <div class="header">
    <h1>&#128275; Password Change Required</h1>
    <p>Your password was reset by an administrator.<br>Please set a new password before continuing.</p>
  </div>
  <div class="body">
    <form id="cpForm" onsubmit="doChange(event)">
      <div class="field">
        <label>Current Password</label>
        <div class="pw-row">
          <input type="password" id="curPw" placeholder="Temporary password from admin" required autocomplete="off">
          <button type="button" class="pw-peek" onclick="var e=document.getElementById('curPw');e.type=e.type==='password'?'text':'password';this.style.opacity=e.type==='text'?'1':'0.4'" title="Show/hide">&#128065;</button>
        </div>
      </div>
      <div class="field">
        <label>New Password</label>
        <div class="pw-row">
          <input type="password" id="newPw" placeholder="Min 12 chars" required autocomplete="off">
          <button type="button" class="pw-peek" onclick="var e=document.getElementById('newPw');e.type=e.type==='password'?'text':'password';this.style.opacity=e.type==='text'?'1':'0.4'" title="Show/hide">&#128065;</button>
        </div>
        <div class="hint">Uppercase + lowercase + number + symbol. Min 12 characters.</div>
      </div>
      <div class="field">
        <label>Confirm New Password</label>
        <div class="pw-row">
          <input type="password" id="confirmPw" placeholder="Repeat new password" required autocomplete="off">
          <button type="button" class="pw-peek" onclick="var e=document.getElementById('confirmPw');e.type=e.type==='password'?'text':'password';this.style.opacity=e.type==='text'?'1':'0.4'" title="Show/hide">&#128065;</button>
        </div>
      </div>
      <button type="submit" class="save-btn" id="saveBtn">Set New Password</button>
    </form>
    <div class="msg" id="cpMsg"></div>
  </div>
</div>

<script>
function doChange(e) {
  e.preventDefault();
  var msg = document.getElementById('cpMsg');
  var btn = document.getElementById('saveBtn');
  msg.className = 'msg';

  var newPw = document.getElementById('newPw').value;
  var confirmPw = document.getElementById('confirmPw').value;
  if (newPw !== confirmPw) {
    msg.className = 'msg err';
    msg.textContent = 'Passwords do not match.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Saving...';

  fetch('/ui/change-password', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      current_password: document.getElementById('curPw').value,
      new_password: newPw,
    }),
  }).then(r => r.json().then(d => {
    if (r.ok) {
      msg.className = 'msg ok';
      msg.textContent = 'Password changed. Redirecting...';
      setTimeout(function() { window.location.href = '/ui/'; }, 1500);
    } else {
      msg.className = 'msg err';
      msg.textContent = d.detail || 'Failed';
      btn.disabled = false;
      btn.textContent = 'Set New Password';
    }
  }));
}
</script>
</body>
</html>
