{# ── MC Editor JS — shared partial (include inside <script> block) ── #}
/* ── Status log helpers ── */
function parseStatusLog(raw) {
  if (!raw) return [];
  try { var arr = JSON.parse(raw); return Array.isArray(arr) ? arr : []; }
  catch(e) {
    // Legacy: plain string → convert to single entry
    if (typeof raw === 'string' && raw.trim()) return [{ at: new Date().toISOString(), by: '?', action: 'cancelled', reason: raw }];
    return [];
  }
}

function appendLogEntry(log, action, reason) {
  log.push({ at: new Date().toISOString(), by: 'human', action: action, reason: reason });
  return JSON.stringify(log);
}

function renderStatusLog(log) {
  var container = document.getElementById('drawerStatusLogEntries');
  var wrapper = document.getElementById('drawerStatusLog');
  if (!log || !log.length) { wrapper.style.display = 'none'; return; }
  wrapper.style.display = 'block';
  container.innerHTML = log.map(function(e) {
    return '<div class="status-log-entry">' +
      '<span class="status-log-dot status-log-dot--' + e.action + '"></span>' +
      '<div class="status-log-body">' +
        '<span class="status-log-header">' + (e.action === 'cancelled' ? 'Cancelled' : 'Reopened') +
          ' <span class="status-log-by">by ' + (e.by || '?') + '</span>' +
          ' <span class="status-log-time">' + vfDateTime(e.at) + '</span></span>' +
        '<span class="status-log-reason">' + (e.reason || '') + '</span>' +
      '</div></div>';
  }).join('');
}

function promptStatusReason(action, callback, onDismiss) {
  var dialog = document.getElementById('statusReasonDialog');
  var form = document.getElementById('statusReasonForm');
  var confirmed = false;
  var titles = { cancelled: '// Cancel Task', reopened: '// Reopen Task', phase_change: '// Move Phase', blocked: '// Mark Blocked' };
  var labels = { cancelled: 'Why is this task being cancelled? *', reopened: 'Why is this task being reopened? *', phase_change: 'Why is this task moving to a different phase? *', blocked: 'What is blocking this task? *' };
  document.getElementById('statusReasonTitle').textContent = titles[action] || '// Transition Reason';
  document.getElementById('statusReasonLabel').textContent = labels[action] || 'Reason *';
  form.elements.reason.value = '';
  form._confirmed = false;
  form._cb = callback;
  if (dialog.open) dialog.close();
  dialog.showModal();
  dialog.addEventListener('close', function onClose() {
    dialog.removeEventListener('close', onClose);
    if (!form._confirmed && onDismiss) onDismiss();
  });
}

function promptCancelReason(callback, onDismiss) { promptStatusReason('cancelled', callback, onDismiss); }

/* ── Description edit toggle ── */
function toggleDescEdit() {
  var ro = document.getElementById('descReadOnly');
  var ta = document.getElementById('drawerFieldDesc');
  var btn = document.getElementById('descEditBtn');
  if (ta.style.display === 'none') {
    ta.style.display = '';
    ro.style.display = 'none';
    btn.innerHTML = '&#10003;';
    ta.focus();
  } else {
    ta.style.display = 'none';
    ro.style.display = '';
    ro.textContent = ta.value || 'No description';
    btn.innerHTML = '&#9998;';
  }
}

/* ── Description collapse toggle ── */
function toggleDescCollapse() {
  var ro = document.getElementById('descReadOnly');
  var ta = document.getElementById('drawerFieldDesc');
  var btn = document.getElementById('descToggleBtn');
  var target = ta.style.display !== 'none' ? ta : ro;
  if (target.classList.contains('collapsed')) {
    target.classList.remove('collapsed');
    btn.classList.remove('collapsed');
  } else {
    target.classList.add('collapsed');
    btn.classList.add('collapsed');
  }
}

/* ── Unified activity feed (MC tabbed: Notes / Notes+Log) ── */
var _activeEditorTab = 'notes';
var _activityData = { notes: [], events: [] };

function loadActivity(taskId) {
  Promise.all([
    fetch('/api/v2/tasks/' + taskId + '/notes').then(r => r.json()),
    fetch('/api/v2/tasks/' + taskId + '/audit').then(r => r.json()),
  ]).then(function(results) {
    _activityData.notes = results[0].map(function(n) { return { type: 'comment', ts: n.created_at, data: n }; });
    _activityData.events = results[1].map(function(e) { return { type: 'event', ts: e.created_at, data: e }; });
    renderActivity();
  });
}

function switchEditorTab(name, el) {
  _activeEditorTab = name;
  document.querySelectorAll('.fce-tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
  // VF-304: toggle between activity feed (notes / full) and the Related panel.
  var feed = document.getElementById('drawerActivityFeed');
  var trans = document.getElementById('drawerTransmission');
  var transLocked = document.getElementById('drawerNotesLocked');
  var relPanel = document.getElementById('drawerRelatedPanel');
  if (name === 'related') {
    if (feed) feed.style.display = 'none';
    if (trans) trans.style.display = 'none';
    if (transLocked) transLocked.style.display = 'none';
    if (relPanel) relPanel.style.display = 'block';
    vf304LoadRelationships();
  } else {
    if (feed) feed.style.display = '';
    if (trans) trans.style.display = '';  // re-evaluated by renderActivity's locked-check
    if (relPanel) relPanel.style.display = 'none';
    renderActivity();
  }
}

function _styleMentions(text) {
  // Replace @Name with styled badge — match full name, first name, or slug.
  // VF-362 hardening: defensive against non-array _mentionables (e.g. fetch
  // returned an error object) and against prefix-collision bugs ("Pat" eating
  // "@Patrick") by sorting all patterns longest-first across all mentionables.
  if (!Array.isArray(_mentionables) || _mentionables.length === 0) return text;
  // Build a flat list of {pattern, badge} pairs, then sort longest-pattern-first
  // so longer matches replace before their prefixes.
  var pairs = [];
  _mentionables.forEach(function(p) {
    var cls = p.type === 'agent' ? 'fce-mention-badge-agent' : 'fce-mention-badge-human';
    var icon = p.type === 'agent' ? '🤖' : '👤';
    var badge = '<span class="fce-mention-badge ' + cls + '">' + icon + ' ' + p.name + '</span>';
    var names = [p.name];
    if (p.name.indexOf(' ') !== -1) names.push(p.name.split(' ')[0]); // first name
    if (p.slug) names.push(p.slug);
    var seen = {};
    names.forEach(function(n) {
      [n, n.toLowerCase()].forEach(function(variant) {
        if (variant && !seen[variant]) {
          seen[variant] = true;
          pairs.push({ pattern: variant, badge: badge });
        }
      });
    });
  });
  // Sort longest-first to avoid prefix shadow (e.g. "Pat" before "Patrick" would
  // replace "@Pat" inside "@Patrick" leaving "<span>Pat</span>rick").
  pairs.sort(function(a, b) { return b.pattern.length - a.pattern.length; });
  pairs.forEach(function(pair) {
    text = text.replace(
      new RegExp('@' + pair.pattern.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'),
      pair.badge
    );
  });
  return text;
}

function _renderComment(n) {
  var colors = { agent: '#7c3aed', human: '#f59e0b', system: '#94a3b8' };
  var bg = colors[n.author_type] || '#7c3aed';
  var initials = (n.author_name || n.author_type).substring(0, 2).toUpperCase();
  var name = n.author_name || n.author_type;
  var body = _styleMentions(n.body);
  var typeIcon = n.author_type === 'agent' ? ' <span class="fce-name-icon fce-name-icon-agent">🤖</span>' : ' <span class="fce-name-icon fce-name-icon-human">👤</span>';
  var completionBadge = n.is_completion_note ? '<span class="fce-completion-badge">completion</span>' : '';
  var internalBadge = n.is_internal ? '<span class="fce-internal-badge">internal</span>' : '';
  var supersededBadge = n.superseded_at ? '<span class="fce-superseded-badge">superseded</span>' : '';
  var noteNum = n._noteNum ? '<span class="fce-note-num">#' + n._noteNum + '</span>' : '';
  var isSuperseded = !!n.superseded_at;
  var bubbleCls = 'fce-bubble';
  if (n.is_completion_note) bubbleCls += ' fce-bubble--completion';
  if (n.is_internal) bubbleCls += ' fce-bubble--internal';
  if (isSuperseded) bubbleCls += ' fce-bubble--superseded';
  var taskIsDone = _drawerOrigStatus === 'done';
  var actionBtn = '';
  if (taskIsDone) {
    // No actions on done tasks
  } else if (isSuperseded) {
    actionBtn = ' <button class="fce-note-revert" onclick="revertSupersede(\'' + n.id + '\')" title="Revert supersede">&#8634;</button>';
  } else {
    actionBtn = ' <button class="fce-note-supersede" onclick="supersedeNote(\'' + n.id + '\')" title="Supersede this note">&#8856;</button>';
  }
  // Render supersede/revert history timeline
  var historyHtml = '';
  if (n.supersede_history && n.supersede_history.length) {
    historyHtml = '<div class="fce-supersede-history">' +
      n.supersede_history.map(function(h) {
        var icon = h.action === 'superseded' ? '&#8856;' : '&#8634;';
        var cls = h.action === 'superseded' ? 'fce-sh-superseded' : 'fce-sh-reverted';
        var ts = h.at ? vfDateTime(h.at) : '';
        return '<div class="fce-sh-entry ' + cls + '">' +
          '<span class="fce-sh-icon">' + icon + '</span>' +
          '<span class="fce-sh-text">' + h.action.charAt(0).toUpperCase() + h.action.slice(1) +
          ' by ' + (h.by || '?') + '</span>' +
          '<span class="fce-sh-reason">' + (h.reason || '') + '</span>' +
          '<span class="fce-sh-time">' + ts + '</span>' +
        '</div>';
      }).join('') +
    '</div>';
  }
  return '<div class="fce-comment">' +
    '<div class="fce-avatar" style="background:' + bg + '">' + initials + '</div>' +
    '<div class="' + bubbleCls + '">' +
      '<div class="fce-bubble-meta"><strong>' + noteNum + ' ' + name + typeIcon + completionBadge + internalBadge + supersededBadge + '</strong><span>' + vfDateTime(n.created_at) +
        actionBtn +
      '</span></div>' +
      '<div class="fce-bubble-text' + (n.author_type === 'agent' ? ' fce-bubble-text--html' : '') + '">' + body + '</div>' +
      historyHtml +
    '</div></div>';
}

function _renderEvent(e) {
  var details = '';
  try {
    var d = JSON.parse(e.details);
    var from = d.from || 'none';
    var to = d.to || 'none';
    if (d.from !== undefined && d.to !== undefined) details = from + ' → ' + to;
    if (d.summary) details = d.summary;
    if (d.note_num) details = '#' + d.note_num + ' ' + details;
    if (d.reason) details += (details ? ' — ' : '') + '"' + d.reason + '"';
    // Per-action detail extraction for events whose details JSON doesn't fit
    // the from/to/summary/reason shape. Without these, the event would render
    // with empty trailing text — visible-but-meaningless in the drawer feed.
    if (e.action === 'docs_state_assessed' && d.docs_state) {
      var dsNote = d.docs_note ? ' — ' + d.docs_note : '';
      details = d.docs_state + dsNote;
    }
  } catch(x) { details = e.details; }
  var action = e.action.replace(/_/g, ' ');
  var actorType = e.actor_type || e.actor || 'system';
  // Resolve actor name from details JSON, fallback to type
  var actorName = actorType;
  try {
    var dd = JSON.parse(e.details);
    actorName = dd.actor || dd.superseded_by || dd.reverted_by || actorType;
  } catch(x) {}
  var actorIcon = '&#9702;'; // ◦ grey dot for system
  var actorCls = 'fce-actor-system';
  if (actorType === 'human') {
    actorIcon = '&#9673;'; // ◉ circled dot
    actorCls = 'fce-actor-human';
    if (actorName === 'human') actorName = _currentUserName || 'Human';
  } else if (actorType === 'agent') {
    actorIcon = '&#9672;'; // ◈ diamond with dot
    actorCls = 'fce-actor-agent';
    if (actorName === 'agent') actorName = 'Agent';
  } else {
    actorName = 'System';
  }
  return '<div class="fce-sys-event">' +
    '<span class="fce-sys-dot ' + actorCls + '"></span>' +
    '<span><b class="' + actorCls + '">[' + actorIcon + ' ' + actorName + ']</b> ' + action + ' ' + details + '</span>' +
    '<span class="fce-sys-time">' + vfDateTime(e.created_at) + '</span>' +
  '</div>';
}

function renderActivity() {
  // Ensure mentionables loaded for @mention badge rendering
  _loadMentionables().then(function() { _renderActivityInner(); });
}

function _renderActivityInner() {
  // Assign sequential note numbers (by created_at order, oldest = #1)
  var notesByTime = _activityData.notes.slice().sort(function(a, b) { return a.ts > b.ts ? 1 : -1; });
  notesByTime.forEach(function(n, i) { n.data._noteNum = i + 1; });

  var items = [];
  if (_activeEditorTab === 'notes') {
    items = _activityData.notes.slice();
  } else {
    items = _activityData.notes.concat(_activityData.events);
  }
  items.sort(function(a, b) { return a.ts > b.ts ? -1 : 1; }); // newest first

  var container = document.getElementById('drawerActivityFeed');
  if (!items.length) {
    container.innerHTML = '<span class="fce-no-activity">No transmissions yet</span>';
    return;
  }

  container.innerHTML = items.map(function(item) {
    if (item.type === 'comment') return _renderComment(item.data);
    else return _renderEvent(item.data);
  }).join('');
}

var _currentUserName = '{{ current_user_name }}';

function addNote() {
  var input = document.getElementById('drawerCommentInput');
  var body = input.value.trim();
  if (!body || !_drawerTaskId) return;
  var isCompletion = document.getElementById('drawerCompletionNote').checked;
  var internalEl = document.getElementById('drawerInternalNote');
  var isInternal = internalEl ? internalEl.checked : false;
  var supersedingNoteId = _loadedNoteId; // capture before clearing
  fetch('/api/v2/tasks/' + _drawerTaskId + '/notes', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      body: '<p>' + body.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</p>',
      author_type: 'human', author_name: _currentUserName,
      is_completion_note: isCompletion,
      is_internal: isInternal
    }),
  }).then(r => {
    if (r.ok) {
      input.value = '';
      document.getElementById('drawerCompletionNote').checked = false;
      if (internalEl) internalEl.checked = false;
      _loadedNoteId = null;
      // Auto-supersede the loaded note if we were editing one
      if (supersedingNoteId) {
        // Count notes to determine new note's number
        var noteCount = _activityData.notes.length + 1;
        fetch('/api/v2/tasks/' + _drawerTaskId + '/notes/' + supersedingNoteId + '/supersede', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ reason: 'Replaced by note #' + noteCount }),
        }).then(function() { loadActivity(_drawerTaskId); });
      } else {
        loadActivity(_drawerTaskId);
      }
    }
  });
}

var _loadedNoteId = null; // track which note was loaded for auto-supersede

function loadLastHumanNote() {
  if (!_activityData.notes.length) return;
  // Find most recent human note that isn't already superseded
  var humanNotes = _activityData.notes
    .filter(function(n) { return n.data.author_type === 'human' && !n.data.superseded_at; })
    .sort(function(a, b) { return a.ts > b.ts ? 1 : -1; });
  if (!humanNotes.length) return;
  var last = humanNotes[humanNotes.length - 1].data;
  // Strip HTML tags to get plain text for editing
  var text = last.body.replace(/<[^>]+>/g, '').trim();
  var input = document.getElementById('drawerCommentInput');
  input.value = text;
  input.focus();
  _loadedNoteId = last.id;
  // If it was a completion note, re-check the box
  if (last.is_completion_note) {
    document.getElementById('drawerCompletionNote').checked = true;
  }
}

function clearDriftFlag() {
  if (!_drawerTaskId) return;
  _openClearDriftModal(_drawerTaskId);
}

// Agent-new-token-style modal — see admin_agent_new.html:90-129 for the pattern.
// Shows the re-alignment prompt in a user-select:all block, offers Copy, then
// the green confirm button posts /clear-drift.
function _openClearDriftModal(taskId) {
  // Fetch task + project info so we can render a personalised re-alignment prompt preview.
  Promise.all([
    fetch('/api/v2/tasks/' + taskId).then(r => r.json()),
    (window._currentUserName ? Promise.resolve(window._currentUserName) : Promise.resolve('you'))
  ]).then(function(results) {
    var task = results[0];
    var humanName = results[1] || 'you';
    var projectSlug = '{{ project.slug }}' || 'your-project';

    // NOTE: keep in sync with app/api/v2/drift_gate.py::build_re_alignment_note.
    // This is a client-side preview of what gets posted to the agent on confirm.
    var prompt = 'Drift flag cleared by ' + humanName + '. Your prior drift-eval responses were detected as likely cached or stale rather than freshly generated \u2014 please re-engage with current session state. Before resuming work on this ticket: ' +
      '(1) re-read CLAUDE.md in full, ' +
      '(2) GET /agentnotes/' + projectSlug + ' to refresh the contract, ' +
      '(3) post a note here stating your current task, current step, and current blocker, ' +
      '(4) when drift-eval next fires, answer truthfully about your session state, ' +
      '(5) if you cannot account for what changed while you were paused, stop and ask in a note before writing.';

    var overlay = document.createElement('div');
    overlay.id = 'clearDriftOverlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:10000';
    // Shared button chrome matching admin_agent_new.html:90-129 (Agent new-token pattern).
    var BTN = 'font-family:JetBrains Mono,monospace;font-size:0.7rem;padding:0.5rem 1.5rem;border-radius:6px;cursor:pointer';
    overlay.innerHTML =
      '<div style="background:#1e293b;border:1px solid rgba(239,68,68,0.3);border-radius:12px;padding:2rem;max-width:560px;width:92vw;box-shadow:0 20px 60px rgba(0,0,0,0.4)">' +
        '<div style="font-family:JetBrains Mono,monospace;font-size:0.7rem;color:rgba(239,68,68,0.85);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.4rem;text-align:center">\u2713 Clear drift flag</div>' +
        '<div style="font-size:0.85rem;font-weight:700;color:#e2e8f0;margin-bottom:0.2rem;text-align:center">' + (task.short_id || 'Task') + ' \u2014 ' + _htmlSafe(task.title || '') + '</div>' +
        '<div style="font-size:0.65rem;color:#94a3b8;margin-bottom:0.5rem;text-align:center;line-height:1.55">Drift-eval mechanism detected likely response gaming \u2014 the agent sent hash-identical responses across multiple prompts, indicating cache-and-replay rather than fresh engagement with session state.</div>' +
        '<div style="font-size:0.6rem;color:#64748b;margin-bottom:1rem;text-align:center;line-height:1.55;font-style:italic">Detection specifics are deliberately hidden from the agent \u2014 telling it exactly what we check would let it optimise around the check rather than re-engage.</div>' +
        '<div style="font-size:0.65rem;color:#94a3b8;margin-bottom:1rem;text-align:center">Copy the re-alignment prompt below and paste to your agent before confirming.</div>' +
        '<div style="font-family:JetBrains Mono,monospace;font-size:0.6rem;color:rgba(167,139,250,0.9);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.5rem">Re-alignment prompt \u2014 paste to your agent</div>' +
        '<div style="position:relative;margin-bottom:1rem">' +
          '<div id="_driftPrompt" style="font-family:Plus Jakarta Sans,sans-serif;font-size:0.78rem;line-height:1.55;color:#e2e8f0;background:rgba(167,139,250,0.06);border:1px solid rgba(167,139,250,0.2);border-radius:8px;padding:1rem;user-select:all;cursor:text;white-space:pre-wrap;max-height:220px;overflow:auto">' + _htmlSafe(prompt) + '</div>' +
          '<div id="_driftCopiedBadge" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#1e293b;border:1px solid rgba(16,185,129,0.5);border-radius:8px;font-family:JetBrains Mono,monospace;font-size:1.1rem;font-weight:700;color:#10b981;opacity:0;pointer-events:none;transition:opacity 0.15s;text-shadow:0 0 8px rgba(16,185,129,0.4)">\u2713 COPIED!</div>' +
        '</div>' +
        '<div style="display:flex;gap:0.5rem;justify-content:center;align-items:center;flex-wrap:wrap">' +
          '<button id="_driftCopyBtn" style="' + BTN + ';border:1px solid rgba(167,139,250,0.35);background:rgba(167,139,250,0.1);color:#a78bfa">Copy</button>' +
          '<button id="_driftCancelBtn" style="' + BTN + ';border:1px solid rgba(148,163,184,0.25);background:transparent;color:#94a3b8">Cancel</button>' +
          '<button id="_driftConfirmBtn" style="' + BTN + ';border:1px solid rgba(16,185,129,0.4);background:rgba(16,185,129,0.15);color:#10b981">I\u2019ve copied it \u2014 clear drift flag</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(overlay);

    // Copy button
    document.getElementById('_driftCopyBtn').onclick = function() {
      navigator.clipboard.writeText(prompt).then(function() {
        var badge = document.getElementById('_driftCopiedBadge');
        badge.style.opacity = '1';
        setTimeout(function() { badge.style.opacity = '0'; }, 1200);
      });
    };
    // Cancel
    document.getElementById('_driftCancelBtn').onclick = function() { overlay.remove(); };
    overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
    // Confirm → POST /clear-drift
    document.getElementById('_driftConfirmBtn').onclick = function() {
      fetch('/api/v2/tasks/' + taskId + '/clear-drift', {
        method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}'
      }).then(function(r) {
        if (r.ok) {
          overlay.remove();
          var el = document.getElementById('drawerDriftClearBtn');
          if (el) el.style.display = 'none';
          loadActivity(taskId);
        } else {
          r.json().then(function(d) { _showAlert('Error', d.detail || 'Failed to clear drift flag'); });
        }
      });
    };
  });
}

function _htmlSafe(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function supersedeNote(noteId) {
  if (!_drawerTaskId || !noteId) return;
  _showPrompt('Supersede Note', 'This note will be struck through and marked as superseded. Why?', 'Reason for superseding...',
    function(reason) {
      if (!reason) return;
      fetch('/api/v2/tasks/' + _drawerTaskId + '/notes/' + noteId + '/supersede', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reason: reason }),
      }).then(r => {
        if (r.ok) loadActivity(_drawerTaskId);
        else r.json().then(function(d) { _showAlert('Error', d.detail || 'Failed to supersede note'); });
      });
    },
    function() { /* cancel = do nothing */ }
  );
}

function revertSupersede(noteId) {
  if (!_drawerTaskId || !noteId) return;
  _showPrompt('Revert Supersede', 'This will restore the note. Why?', 'Reason for reverting...',
    function(reason) {
      if (!reason) return;
      fetch('/api/v2/tasks/' + _drawerTaskId + '/notes/' + noteId + '/revert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reason: reason }),
      }).then(r => {
        if (r.ok) loadActivity(_drawerTaskId);
        else r.json().then(function(d) { _showAlert('Error', d.detail || 'Failed to revert'); });
      });
    },
    function() { /* cancel = do nothing */ }
  );
}

/* ── @mention autocomplete with keyboard nav ── */
var _mentionables = null;
var _mentionDropdown = null;
var _mentionActive = false;
var _mentionIdx = -1;
var _mentionMatches = [];
var _mentionInput = null;

function _ensureMentionDropdown() {
  if (_mentionDropdown) return;
  _mentionDropdown = document.createElement('div');
  _mentionDropdown.className = 'fce-mention-dropdown';
  _mentionDropdown.style.display = 'none';
  document.body.appendChild(_mentionDropdown);
}

function _loadMentionables() {
  var slug = '{{ project.slug }}';
  if (_mentionables !== null) return Promise.resolve(_mentionables);
  return fetch('/api/v2/projects/' + slug + '/mentionables')
    .then(function(r) { return r.json(); })
    .then(function(data) { _mentionables = data; return data; });
}

function _selectMention(item) {
  if (!_mentionInput || !item) return;
  var val = _mentionInput.value;
  var cursor = _mentionInput.selectionStart;
  var before = val.substring(0, cursor);
  var after = val.substring(cursor);
  var atIdx = before.lastIndexOf('@');
  if (atIdx !== -1) {
    _mentionInput.value = before.substring(0, atIdx) + '@' + item.name + ' ' + after;
    _mentionInput.selectionStart = _mentionInput.selectionEnd = atIdx + item.name.length + 2;
  }
  _closeMentionDropdown();
  _mentionInput.focus();
  fetch('/api/v2/triggers/mention', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      task_id: _drawerTaskId || '', note_id: null,
      mentioned_name: item.name, mentioned_type: item.type, mentioned_id: item.id
    }),
  });
}

function _closeMentionDropdown() {
  if (_mentionDropdown) _mentionDropdown.style.display = 'none';
  _mentionActive = false;
  _mentionIdx = -1;
  _mentionMatches = [];
}

function _highlightMentionItem(idx) {
  if (!_mentionDropdown) return;
  var items = _mentionDropdown.querySelectorAll('.fce-mention-item');
  items.forEach(function(el, i) { el.classList.toggle('fce-mention-active', i === idx); });
  if (items[idx]) items[idx].scrollIntoView({ block: 'nearest' });
}

function _showMentionDropdown(input, filter) {
  _ensureMentionDropdown();
  _mentionInput = input;
  _loadMentionables().then(function(people) {
    var q = filter.toLowerCase();
    _mentionMatches = people.filter(function(p) { return p.name.toLowerCase().indexOf(q) !== -1; });
    if (!_mentionMatches.length) { _closeMentionDropdown(); return; }

    _mentionIdx = 0;
    _mentionActive = true;

    _mentionDropdown.innerHTML = _mentionMatches.map(function(p, i) {
      var cls = p.type === 'agent' ? 'fce-mention-agent' : 'fce-mention-human';
      var activeCls = i === 0 ? ' fce-mention-active' : '';
      var icon = p.type === 'agent' ? '🤖' : '👤';
      return '<div class="fce-mention-item ' + cls + activeCls + '" data-idx="' + i + '">' +
        '<span class="fce-mention-icon">' + icon + '</span>' +
        '<span class="fce-mention-name">' + p.name + '</span>' +
        '<span class="fce-mention-type">' + p.type + '</span></div>';
    }).join('');

    var rect = input.getBoundingClientRect();
    _mentionDropdown.style.left = rect.left + 'px';
    _mentionDropdown.style.top = (rect.bottom + 2) + 'px';
    _mentionDropdown.style.width = Math.max(rect.width, 200) + 'px';
    _mentionDropdown.style.display = 'block';

    // Mouse click
    _mentionDropdown.querySelectorAll('.fce-mention-item').forEach(function(el) {
      el.addEventListener('mousedown', function(e) {
        e.preventDefault();
        _selectMention(_mentionMatches[parseInt(el.dataset.idx)]);
      });
    });
  });
}

// @mention input listener — works on editor comment AND add task description
var _mentionFields = ['drawerCommentInput', 'addTaskDesc', 'addTaskNote'];
document.addEventListener('input', function(e) {
  if (_mentionFields.indexOf(e.target.id) === -1) return;
  var val = e.target.value;
  var cursor = e.target.selectionStart;
  var before = val.substring(0, cursor);
  var atMatch = before.match(/@(\w*)$/);
  if (atMatch) {
    _showMentionDropdown(e.target, atMatch[1]);
  } else {
    _closeMentionDropdown();
  }
});

// Keyboard nav — arrow up/down, Tab/Enter to select, Escape to close
document.addEventListener('keydown', function(e) {
  if (!_mentionActive || _mentionFields.indexOf(e.target.id) === -1) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    _mentionIdx = Math.min(_mentionIdx + 1, _mentionMatches.length - 1);
    _highlightMentionItem(_mentionIdx);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    _mentionIdx = Math.max(_mentionIdx - 1, 0);
    _highlightMentionItem(_mentionIdx);
  } else if (e.key === 'Tab' || e.key === 'Enter') {
    if (_mentionMatches.length > 0) {
      e.preventDefault();
      _selectMention(_mentionMatches[_mentionIdx >= 0 ? _mentionIdx : 0]);
    }
  } else if (e.key === 'Escape') {
    e.preventDefault();
    _closeMentionDropdown();
  }
});

// Close mention dropdown on blur
document.addEventListener('blur', function(e) {
  if (e.target.id === 'drawerCommentInput') {
    setTimeout(_closeMentionDropdown, 200);
  }
}, true);

/* ── Floating card editor ── */
var _drawerTaskId = null;
var _drawerOrigStatus = null;
// Scale to available viewport — generous on large screens, compact on small
var _vw = window.innerWidth, _vh = window.innerHeight;
var _fceDefaultW = _vw >= 1920 ? Math.round(_vw * 0.75) : _vw >= 1024 ? Math.round(_vw * 0.80) : Math.min(520, _vw * 0.92);
var _fceDefaultH = _vh >= 1080 ? Math.round(_vh * 0.88) : _vh >= 768 ? Math.round(_vh * 0.85) : Math.min(680, _vh * 0.9);
var _fceSavedPos = null; // {x, y, w, h} persisted if in center zone

function openDrawer(taskId, sourceEl) {
  _drawerTaskId = taskId;
  var overlay = document.getElementById('taskEditorOverlay');
  var card = document.getElementById('taskEditorCard');
  overlay.style.display = 'block';

  // Determine size & position — always clamp to visible viewport
  var vw = window.innerWidth, vh = window.innerHeight;
  var w = _fceSavedPos ? _fceSavedPos.w : _fceDefaultW;
  var h = _fceSavedPos ? _fceSavedPos.h : _fceDefaultH;
  // Clamp size to viewport
  w = Math.min(w, vw - 16);
  h = Math.min(h, vh - 16);
  var cx = _fceSavedPos ? _fceSavedPos.x : (vw - w) / 2;
  var cy = _fceSavedPos ? _fceSavedPos.y : (vh - h) / 2;
  // Clamp position so card is fully visible (8px margin)
  cx = Math.max(8, Math.min(cx, vw - w - 8));
  cy = Math.max(8, Math.min(cy, vh - h - 8));

  if (sourceEl) {
    // Grow from clicked card
    var rect = sourceEl.getBoundingClientRect();
    card.style.left = rect.left + 'px';
    card.style.top = rect.top + 'px';
    card.style.width = rect.width + 'px';
    card.style.height = rect.height + 'px';
    card.classList.remove('is-visible');
    // Force layout
    card.offsetHeight;
    card.style.transition = 'left 0.6s cubic-bezier(0.2,0,0.2,1), top 0.6s cubic-bezier(0.2,0,0.2,1), width 0.6s cubic-bezier(0.2,0,0.2,1), height 0.6s cubic-bezier(0.2,0,0.2,1), opacity 0.2s';
    card.classList.add('is-visible');
    requestAnimationFrame(() => {
      card.style.left = cx + 'px';
      card.style.top = cy + 'px';
      card.style.width = w + 'px';
      card.style.height = h + 'px';
    });
  } else {
    // Open from center (new task / no source)
    card.style.left = cx + 'px';
    card.style.top = cy + 'px';
    card.style.width = w + 'px';
    card.style.height = h + 'px';
    card.style.transition = 'opacity 0.3s, transform 0.3s';
    card.style.transform = 'scale(0.9)';
    card.offsetHeight;
    card.classList.add('is-visible');
    card.style.transform = 'scale(1)';
  }

  // After animation, remove transition so drag/resize isn't animated
  setTimeout(() => { card.style.transition = 'opacity 0.15s'; }, 700);

  // Reset tabs to Notes on open + clear comment textarea
  // VF-350: previously this reset only flipped the .fce-tab.active class on the
  // tab buttons, but the content panels (drawerActivityFeed / drawerTransmission /
  // drawerRelatedPanel) kept whatever display state the previous drawer left them
  // in. Closing on RELATED meant the next open rendered the related panel under
  // a Notes-tab header. Now we also force the content-panel visibility back to
  // Notes-mode every open.
  _activeEditorTab = 'notes';
  document.querySelectorAll('.fce-tab').forEach(function(t) { t.classList.remove('active'); });
  var notesTab = document.querySelector('.fce-tab[data-tab="notes"]');
  if (notesTab) notesTab.classList.add('active');
  var _resetFeed = document.getElementById('drawerActivityFeed');
  var _resetTrans = document.getElementById('drawerTransmission');
  var _resetRel = document.getElementById('drawerRelatedPanel');
  if (_resetFeed) _resetFeed.style.display = '';
  if (_resetTrans) _resetTrans.style.display = '';   // re-evaluated by renderActivity's locked-check
  if (_resetRel) _resetRel.style.display = 'none';
  document.getElementById('drawerCommentInput').value = '';

  // Load task data
  fetch('/api/v2/tasks/' + taskId)
    .then(r => r.json())
    .then(t => {
      _drawerOrigStatus = t.status;
      document.getElementById('drawerFieldTitle').value = t.title;
      // MC header status line
      var statusDisplay = (t.status || '').toUpperCase().replace(/_/g, '_');
      var shortId = t.short_id || '';
      document.getElementById('drawerStatusText').textContent =
        (shortId ? shortId + ' // ' : '') + statusDisplay + ' // priority: ' + (t.priority || 'medium') + ' // ' + (t.owner_label || 'agent');
      // Drift flag visibility — only renders when the task has an active drift escalation.
      // v4.1 UX: single pulsing Clear button (was pill+button).
      var driftBtnEl = document.getElementById('drawerDriftClearBtn');
      if (driftBtnEl) {
        driftBtnEl.style.display = t.has_active_drift_flag ? '' : 'none';
      }
      // Short description + Description
      document.getElementById('drawerFieldShortDesc').value = t.short_description || '';
      document.getElementById('drawerFieldDesc').value = t.description || '';
      document.getElementById('drawerFieldDesc').style.display = 'none';
      document.getElementById('descReadOnly').style.display = '';
      document.getElementById('descReadOnly').textContent = t.description || 'No description';
      document.getElementById('descEditBtn').innerHTML = '&#9998;';
      // Properties sidebar
      document.getElementById('drawerFieldStatus').value = t.status;
      document.getElementById('drawerFieldPriority').value = t.priority;
      // Populate owner dropdown from project members
      var ownerSel = document.getElementById('drawerFieldOwner');
      fetch('/api/v2/projects/{{ project.slug }}/members').then(r => r.json()).then(function(members) {
        ownerSel.innerHTML = members.map(function(m) {
          var icon = m.type === 'agent' ? '\u{1F916}' : '\u{1F464}';
          var val = m.type + ':' + m.name;
          var selected = (t.owner_label === m.type || t.owner_label === m.name) ? ' selected' : '';
          return '<option value="' + val + '"' + selected + '>' + icon + ' ' + m.name + '</option>';
        }).join('');
        // Try to select the current owner
        var match = t.owner_label || 'agent';
        for (var i = 0; i < ownerSel.options.length; i++) {
          if (ownerSel.options[i].value.indexOf(match) !== -1) { ownerSel.selectedIndex = i; break; }
        }
        // Update origValues with the actual dropdown value after population
        if (window._drawerOrigValues) {
          window._drawerOrigValues.owner_label = ownerSel.value;
        }
      });
      document.getElementById('drawerFieldMilestone').textContent = t.milestone_label || '–';
      fetch('/api/v2/projects/{{ project.slug }}/phases').then(r => r.json()).then(phases => {
        var sel = document.getElementById('drawerFieldPhase');
        sel.innerHTML = phases.map(p =>
          '<option value="' + p.id + '"' + (p.id === t.phase_id ? ' selected' : '') + '>' +
          p.milestone_label + ' / ' + p.name + '</option>'
        ).join('');
        // Set orig AFTER dropdown populated so it matches actual selected value
        window._drawerOrigPhase = sel.value;
      });
      document.getElementById('drawerFieldTaskType').value = t.task_type || '';
      document.getElementById('drawerFieldStart').value = t.start_date || '';
      document.getElementById('drawerFieldDue').value = t.due_date || '';
      document.getElementById('drawerFieldBlockedBy').value = t.blocked_by_task_id || '';
      window._drawerLog = parseStatusLog(t.abandoned_note);
      document.getElementById('drawerCreated').textContent = 'created: ' + vfDateTime(t.created_at);
      document.getElementById('drawerUpdated').textContent = 'updated: ' + vfDateTime(t.updated_at);

      // Lock/unlock fields based on terminal status OR project read-only
      var isProjectReadOnly = window._projectReadOnly || false;
      var isTerminal = t.status === 'cancelled' || t.status === 'done' || isProjectReadOnly;
      document.getElementById('drawerFieldPriority').disabled = isTerminal;
      document.getElementById('drawerFieldOwner').disabled = isTerminal;
      document.getElementById('drawerFieldTaskType').disabled = isTerminal;
      document.getElementById('drawerFieldStart').disabled = isTerminal;
      document.getElementById('drawerFieldDue').disabled = isTerminal;
      document.getElementById('drawerFieldBlockedBy').disabled = isTerminal;
      document.getElementById('drawerFieldPhase').disabled = isTerminal;
      document.getElementById('drawerFieldShortDesc').disabled = isTerminal;
      document.getElementById('drawerFieldTitle').disabled = isTerminal;
      document.getElementById('drawerFieldDesc').disabled = isTerminal;
      // Status dropdown: reset all options, then restrict for terminal tasks
      var statusSel = document.getElementById('drawerFieldStatus');
      for (var i = 0; i < statusSel.options.length; i++) {
        statusSel.options[i].disabled = false;
      }
      if (isTerminal) {
        var allowed = t.status === 'cancelled'
          ? ['cancelled', 'backlog', 'ready', 'in_progress']
          : ['done', 'in_progress', 'ready'];
        for (var i = 0; i < statusSel.options.length; i++) {
          statusSel.options[i].disabled = allowed.indexOf(statusSel.options[i].value) === -1;
        }
      }

      // Snapshot original values for dirty detection
      window._drawerOrigValues = {
        title: t.title,
        description: t.description || '',
        status: t.status,
        priority: t.priority,
        owner_label: t.owner_label,
        start_date: t.start_date || '',
        due_date: t.due_date || '',
        blocked_by_task_id: String(t.blocked_by_task_id || ''),
      };

      // Hide interactive elements on read-only projects
      var transmissionEl = document.getElementById('drawerTransmission');
      var lockedEl = document.getElementById('drawerNotesLocked');
      if (isProjectReadOnly) {
        document.getElementById('drawerSaveBtn').style.display = 'none';
        if (transmissionEl) transmissionEl.style.display = 'none';
        if (lockedEl) { lockedEl.style.display = ''; lockedEl.querySelector('p').textContent = 'Project is read-only.'; }
      } else if (t.status === 'done') {
        // Notes locked when done — reopen to add new notes
        if (transmissionEl) transmissionEl.style.display = 'none';
        if (lockedEl) { lockedEl.style.display = ''; lockedEl.querySelector('p').textContent = 'Task is closed. Reopen to add new notes.'; }
        document.getElementById('drawerSaveBtn').style.display = '';
      } else {
        if (transmissionEl) transmissionEl.style.display = '';
        if (lockedEl) lockedEl.style.display = 'none';
        document.getElementById('drawerSaveBtn').style.display = '';
        document.getElementById('drawerCommentInput').disabled = false;
        document.getElementById('drawerCommentInput').placeholder = '> Enter message...';
      }

      // Load unified activity feed
      loadActivity(taskId);
    });
}

function closeEditor() {
  var card = document.getElementById('taskEditorCard');
  // Save position if in center zone
  var vw = window.innerWidth, vh = window.innerHeight;
  var r = card.getBoundingClientRect();
  var centerZone = r.left > vw * 0.15 && r.right < vw * 0.85 && r.top > vh * 0.1 && r.bottom < vh * 0.9;
  if (centerZone) {
    _fceSavedPos = { x: r.left, y: r.top, w: r.width, h: r.height };
  } else {
    _fceSavedPos = null; // snap back to default center next time
  }

  card.style.transition = 'opacity 0.25s, transform 0.25s';
  card.style.transform = 'scale(0.95)';
  card.classList.remove('is-visible');
  setTimeout(() => {
    document.getElementById('taskEditorOverlay').style.display = 'none';
    card.style.transform = '';
  }, 280);
}

// Keep old name for compatibility with saveDrawer
function closeDrawer() { closeEditor(); }

/* ── Dirty detection for editor drawer (field changes only) ── */
function _isEditorDirty() {
  var o = window._drawerOrigValues;
  if (!o) return false;
  return (
    document.getElementById('drawerFieldTitle').value !== o.title ||
    document.getElementById('drawerFieldDesc').value !== o.description ||
    document.getElementById('drawerFieldStatus').value !== o.status ||
    document.getElementById('drawerFieldPriority').value !== o.priority ||
    document.getElementById('drawerFieldOwner').value !== o.owner_label ||
    document.getElementById('drawerFieldStart').value !== o.start_date ||
    document.getElementById('drawerFieldDue').value !== o.due_date ||
    String(document.getElementById('drawerFieldBlockedBy').value || '') !== o.blocked_by_task_id
  );
}

/* ── MC-styled dialog helpers (confirm, prompt, alert) ── */
function _mcDialog(opts) {
  // opts: { title, msg, confirmLabel, cancelLabel, showInput, inputPlaceholder, showSelect, selectOptions, onConfirm, onCancel }
  document.getElementById('fceConfirmTitle').textContent = opts.title || 'Confirm';
  document.getElementById('fceConfirmMsg').textContent = opts.msg || '';

  var selectWrap = document.getElementById('fceConfirmSelect');
  var inputWrap = document.getElementById('fceConfirmInput');
  var selectEl = document.getElementById('fceConfirmSelectInput');
  var inputEl = document.getElementById('fceConfirmInputField');

  selectWrap.style.display = opts.showSelect ? 'block' : 'none';
  inputWrap.style.display = opts.showInput ? 'block' : 'none';

  if (opts.showSelect && opts.selectOptions) {
    selectEl.innerHTML = opts.selectOptions.map(function(o) {
      return '<option value="' + o.value + '">' + o.label + '</option>';
    }).join('');
  }
  if (opts.showInput) {
    inputEl.value = '';
    inputEl.placeholder = opts.inputPlaceholder || 'Enter reason...';
  }

  var saveBtn = document.getElementById('fceConfirmSave');
  var discardBtn = document.getElementById('fceConfirmDiscard');
  var newSave = saveBtn.cloneNode(true);
  var newDiscard = discardBtn.cloneNode(true);
  newSave.textContent = opts.confirmLabel || 'Confirm';
  newDiscard.textContent = opts.cancelLabel || 'Cancel';
  saveBtn.parentNode.replaceChild(newSave, saveBtn);
  discardBtn.parentNode.replaceChild(newDiscard, discardBtn);

  // Hide cancel if alert mode
  newDiscard.style.display = opts.onCancel ? '' : 'none';

  newSave.addEventListener('click', function() {
    document.getElementById('fceConfirmOverlay').style.display = 'none';
    var result = {};
    if (opts.showSelect) result.selected = selectEl.value;
    if (opts.showInput) result.text = inputEl.value.trim();
    if (opts.onConfirm) opts.onConfirm(result);
  });
  newDiscard.addEventListener('click', function() {
    document.getElementById('fceConfirmOverlay').style.display = 'none';
    if (opts.onCancel) opts.onCancel();
  });

  document.getElementById('fceConfirmOverlay').style.display = 'flex';
  if (opts.showInput) setTimeout(function() { inputEl.focus(); }, 100);
}

function _showConfirm(title, msg, onSave, onDiscard) {
  _mcDialog({ title: title, msg: msg, confirmLabel: 'Save', cancelLabel: 'Discard', onConfirm: onSave, onCancel: onDiscard });
}

function _showAlert(title, msg) {
  _mcDialog({ title: title, msg: msg, confirmLabel: 'OK', onConfirm: function(){} });
}

function _showPrompt(title, msg, placeholder, onConfirm, onCancel) {
  _mcDialog({ title: title, msg: msg, showInput: true, inputPlaceholder: placeholder, confirmLabel: 'Confirm', cancelLabel: 'Cancel', onConfirm: function(r) { onConfirm(r.text); }, onCancel: onCancel || function(){} });
}

function _showSelectPrompt(title, msg, options, placeholder, onConfirm, onCancel) {
  _mcDialog({ title: title, msg: msg, showSelect: true, selectOptions: options, showInput: true, inputPlaceholder: placeholder, confirmLabel: 'Confirm', cancelLabel: 'Cancel', onConfirm: function(r) { onConfirm(r.selected, r.text); }, onCancel: onCancel || function(){} });
}

function handleEditorClickAway() {
  var hasUnsavedFields = _isEditorDirty();
  var hasUnsentNote = document.getElementById('drawerCommentInput').value.trim();
  if (hasUnsavedFields || hasUnsentNote) {
    var msg = hasUnsavedFields && hasUnsentNote
      ? 'You have unsaved field changes and an unsent note. Save fields or discard all?'
      : hasUnsentNote
      ? 'You have an unsent note. Close and discard it?'
      : 'You have unsaved changes to this task. Save or discard?';
    var confirmLabel = hasUnsavedFields ? 'Save' : 'Discard';
    var onConfirm = hasUnsavedFields ? function() { saveDrawer(); } : function() { window._drawerOrigValues = null; closeEditor(); };
    _showConfirm('Unsaved Changes', msg,
      onConfirm,
      function() { window._drawerOrigValues = null; closeEditor(); }
    );
  } else {
    closeEditor();
  }
}

/* ── Drag (header) + Resize (corner) ── */
(function() {
  var card, startX, startY, startL, startT, startW, startH, mode;

  function onDown(e) {
    if (e.target.closest('button, input, select, textarea, a')) return;
    e.preventDefault();
    card = document.getElementById('taskEditorCard');
    var r = card.getBoundingClientRect();
    startX = e.clientX; startY = e.clientY;
    startL = r.left; startT = r.top; startW = r.width; startH = r.height;
    mode = e.target.id === 'fceResize' ? 'resize' : 'drag';
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  }

  function onMove(e) {
    var dx = e.clientX - startX, dy = e.clientY - startY;
    if (mode === 'drag') {
      card.style.left = (startL + dx) + 'px';
      card.style.top = (startT + dy) + 'px';
    } else {
      card.style.width = Math.max(350, startW + dx) + 'px';
      card.style.height = Math.max(300, startH + dy) + 'px';
    }
  }

  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }

  document.addEventListener('DOMContentLoaded', function() {
    var hdr = document.getElementById('fceHeader');
    var rsz = document.getElementById('fceResize');
    if (hdr) hdr.addEventListener('mousedown', onDown);
    if (rsz) rsz.addEventListener('mousedown', onDown);
  });
})();

function saveDrawer() {
  var isTerminal = _drawerOrigStatus === 'cancelled' || _drawerOrigStatus === 'done';
  var body = {};

  if (isTerminal) {
    // Terminal tasks: only allow status change (reopen) — other fields locked
    var newStatus = document.getElementById('drawerFieldStatus').value;
    if (newStatus === _drawerOrigStatus) {
      // No status change — just commit any pending comment and close
      var commentInput = document.getElementById('drawerCommentInput');
      var pendingComment = commentInput.value.trim();
      if (pendingComment && _drawerTaskId) {
        fetch('/api/v2/tasks/' + _drawerTaskId + '/notes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ body: '<p>' + pendingComment.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</p>', author_type: 'human', author_name: _currentUserName }),
        }).then(function() { loadActivity(_drawerTaskId); });
        commentInput.value = '';
        var btn = document.getElementById('drawerSaveBtn');
        btn.textContent = 'Saved'; btn.classList.add('fce-btn-saved'); btn.disabled = true;
        setTimeout(function() { btn.textContent = 'Save'; btn.classList.remove('fce-btn-saved'); btn.disabled = false; }, 1500);
      }
      return;
    }
    body.status = newStatus;
  } else {
    body = {
      title: document.getElementById('drawerFieldTitle').value,
      short_description: document.getElementById('drawerFieldShortDesc').value,
      description: document.getElementById('drawerFieldDesc').value,
      status: document.getElementById('drawerFieldStatus').value,
      priority: document.getElementById('drawerFieldPriority').value,
      owner_label: document.getElementById('drawerFieldOwner').value,
      task_type: document.getElementById('drawerFieldTaskType').value || null,
    };
    var startVal = document.getElementById('drawerFieldStart').value;
    var dueVal = document.getElementById('drawerFieldDue').value;
    if (startVal) body.start_date = startVal;
    if (dueVal) body.due_date = dueVal;
    body.blocked_by_task_id = document.getElementById('drawerFieldBlockedBy').value || '';
  }
  var newPhase = isTerminal ? '' : (document.getElementById('drawerFieldPhase').value || '');

  var newStatus = body.status;
  // Check both orig status AND if log has cancel entries (covers edge cases)
  var hasLog = window._drawerLog && window._drawerLog.length > 0;
  var wasCancelled = (_drawerOrigStatus === 'cancelled');
  var wasDone = (_drawerOrigStatus === 'done');
  var wasTerminal = wasCancelled || wasDone;
  var isCancelling = (newStatus === 'cancelled') && !wasCancelled;
  var isReopening = wasTerminal && newStatus !== 'cancelled' && newStatus !== 'done';
  // Also prompt reopen if task has a cancel log but is being moved away from cancelled
  if (!isReopening && hasLog && newStatus !== 'cancelled' && _drawerOrigStatus === 'cancelled') isReopening = true;

  if (isCancelling) {
    promptStatusReason('cancelled', function(reason) {
      body.abandoned_note = appendLogEntry(window._drawerLog || [], 'cancelled', reason);
      body.transition_note = 'Cancelled: ' + reason;
      _doSaveDrawer(body);
    });
    return;
  }
  if (isReopening) {
    promptStatusReason('reopened', function(reason) {
      body.abandoned_note = appendLogEntry(window._drawerLog, 'reopened', reason);
      body.transition_note = 'Reopened: ' + reason;
      _doSaveDrawer(body);
    });
    return;
  }

  // Phase change — prompt for reason (skip if reopening from terminal — phase value is unreliable)
  var phaseChanged = !isTerminal && newPhase !== window._drawerOrigPhase;
  if (phaseChanged) {
    promptStatusReason('phase_change', function(reason) {
      body.phase_id = newPhase;
      body.phase_change_reason = reason;
      _doSaveDrawer(body);
    });
    return;
  }

  // Gated transition — prompt for reason on blocked (agent note-fidelity gate handles the rest)
  if (newStatus && newStatus !== _drawerOrigStatus && newStatus === 'blocked') {
    promptStatusReason(newStatus, function(reason) {
      body.transition_note = reason;
      _doSaveDrawer(body);
    });
    return;
  }

  // Other status changes — auto-generate note
  if (newStatus && newStatus !== _drawerOrigStatus) {
    body.transition_note = 'Status changed from ' + _drawerOrigStatus + ' to ' + newStatus + ' via editor';
  }

  _doSaveDrawer(body);
}

function _doSaveDrawer(body) {
  fetch('/api/v2/tasks/' + _drawerTaskId, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  }).then(r => {
    if (!r.ok) {
      r.json().then(function(d) {
        var msg = d.detail || 'Save failed';
        // Revert status dropdown to original value on rejection
        if (_drawerOrigStatus) {
          document.getElementById('drawerFieldStatus').value = _drawerOrigStatus;
        }
        _showAlert('Save Failed', msg);
      }).catch(function() {
        _showAlert('Save Failed', 'An unexpected error occurred.');
      });
      return;
    }
    if (r.ok) {
      // Commit any pending comment as a note
      var commentInput = document.getElementById('drawerCommentInput');
      var pendingComment = commentInput.value.trim();
      if (pendingComment && _drawerTaskId) {
        fetch('/api/v2/tasks/' + _drawerTaskId + '/notes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ body: '<p>' + pendingComment.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</p>', author_type: 'human', author_name: _currentUserName }),
        });
        commentInput.value = '';
      }

      // Visual feedback: button turns green briefly
      var btn = document.getElementById('drawerSaveBtn');
      btn.textContent = 'Saved';
      btn.classList.add('fce-btn-saved');
      btn.disabled = true;

      // Refresh affected columns
      var refreshStatuses = new Set([body.status]);
      if (_drawerOrigStatus && _drawerOrigStatus !== body.status) refreshStatuses.add(_drawerOrigStatus);
      refreshStatuses.forEach(s => {
        var col = document.getElementById('col-' + s);
        if (col) htmx.ajax('GET', col.getAttribute('hx-get'), { target: '#col-' + s, swap: 'innerHTML' });
      });

      // Update orig status for next save
      _drawerOrigStatus = body.status;
      if (body.phase_id) window._drawerOrigPhase = body.phase_id;

      // Reload activity feed to show new audit entries
      loadActivity(_drawerTaskId);

      // Update dirty snapshot to current values (save succeeded)
      window._drawerOrigValues = {
        title: body.title,
        description: body.description,
        status: body.status,
        priority: body.priority,
        owner_label: body.owner_label,
        start_date: document.getElementById('drawerFieldStart').value || '',
        due_date: document.getElementById('drawerFieldDue').value || '',
        blocked_by_task_id: String(document.getElementById('drawerFieldBlockedBy').value || ''),
      };

      // Show "Saved" feedback, then auto-close after 1.5s
      setTimeout(() => {
        btn.textContent = 'Save';
        btn.classList.remove('fce-btn-saved');
        btn.disabled = false;
        window._drawerOrigValues = null; // prevent dirty prompt on auto-close
        closeEditor();
      }, 1500);
    } else {
      r.json().then(d => vfToast(d.detail || 'Error saving'));
    }
  });
}

// ═════════════════════════════════════════════════════════════════════
// VF-304: blocked-by picker + Related tab + reason modal
// ═════════════════════════════════════════════════════════════════════

// Module state
var _vf304Relationships = null;     // last-fetched {blocked_by, blocks, related}
var _vf304ReasonMode = null;        // 'set' | 'clear' | 'set-reverse' | 'add-related' | 'remove-related'
var _vf304PendingRow = null;        // full row for the task being picked
var _vf304PendingKind = null;       // 'blocked_by' | 'blocks' | 'related'
var _vf304PendingRelId = null;      // relationship_id being removed (for remove-related)

function _vf304Esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

// Refresh from server: writes blocked_by chip in sidebar + Related tab content if active.
async function vf304LoadRelationships() {
  if (!_drawerTaskId) return;
  try {
    const r = await fetch('/api/v2/tasks/' + _drawerTaskId + '/relationships', {credentials:'same-origin'});
    if (!r.ok) return;
    const d = await r.json();
    _vf304Relationships = d;
    vf304RenderSidebarChip(d.blocked_by);
    vf304RenderRelatedPanel(d);
    const cnt = (d.blocked_by ? 1 : 0) + (d.blocks ? d.blocks.length : 0);
    const badge = document.getElementById('drawerRelatedCount');
    if (badge) badge.textContent = cnt > 0 ? cnt : '';
  } catch(e) { /* silent */ }
}

function vf304RenderSidebarChip(bb) {
  const host = document.getElementById('drawerBlockedByChip');
  const hidden = document.getElementById('drawerFieldBlockedBy');
  if (!host) return;
  if (!bb) {
    if (hidden) hidden.value = '';
    host.className = 'vf304-bb-empty';
    host.innerHTML = '<button type="button" class="vf304-bb-pick" onclick="vf304OpenBlockerPicker()">+ Pick a blocker</button>';
    return;
  }
  if (hidden) hidden.value = bb.id;
  host.className = '';
  host.innerHTML =
    '<div class="vf304-bb-chip" title="' + _vf304Esc(bb.title || '') + '">' +
      '<span class="icon">&#128274;</span>' +
      '<span class="id">' + _vf304Esc(bb.short_id || '') + '</span>' +
      '<span class="title">' + _vf304Esc(bb.title || '') + '</span>' +
      '<button type="button" class="pcd-member-remove" onclick="vf304OpenClearBlockerModal()" title="Clear blocker &mdash; reason required">&#10005;</button>' +
    '</div>';
}

function vf304RenderRelatedPanel(d) {
  const bbHost = document.getElementById('vf304BbBody');
  const bbCnt = document.getElementById('vf304BbCnt');
  const blocksHost = document.getElementById('vf304BlocksBody');
  const blocksCnt = document.getElementById('vf304BlocksCnt');
  const relHost = document.getElementById('vf304RelBody');
  const relCnt = document.getElementById('vf304RelCnt');
  if (!bbHost || !blocksHost || !relHost) return;

  // Blocked-by section: single line-item (or empty)
  if (d.blocked_by) {
    bbCnt.textContent = '1';
    bbHost.innerHTML = vf304LineItem(d.blocked_by, 'blocked_by', {
      linked_at: d.blocked_by.linked_at, linked_by: d.blocked_by.linked_by, reason: d.blocked_by.reason,
      clear_handler: "vf304OpenClearBlockerModal()",
    });
  } else {
    bbCnt.textContent = '0';
    bbHost.innerHTML = '<div class="vf304-empty">Not blocked.</div>';
  }

  // Blocks (reverse) section
  const blocks = d.blocks || [];
  blocksCnt.textContent = String(blocks.length);
  if (!blocks.length) {
    blocksHost.innerHTML = '<div class="vf304-empty">Nothing depends on this.</div>';
  } else {
    try {
      blocksHost.innerHTML = blocks.map(t => vf304LineItem(t, 'blocks')).join('');
    } catch(err) {
      console.error('[vf304] blocks render failed', err, blocks);
      blocksHost.innerHTML = '<div class="vf304-empty">Render error &mdash; check console.</div>';
    }
  }

  // Related section
  const related = d.related || [];
  relCnt.textContent = String(related.length);
  if (!related.length) {
    relHost.innerHTML = '<div class="vf304-empty">No related links.</div>';
  } else {
    // VF-304 render-robustness: render items one-by-one so one bad row
    // doesn't cut off the rest. Log per-item failures for diagnosis.
    const parts = [];
    related.forEach((t, i) => {
      try {
        parts.push(vf304LineItem(t, 'related', {
          linked_at: t.linked_at, reason: t.reason, rel_id: t._rel_id,
        }));
      } catch(err) {
        console.error('[vf304] related item ' + i + ' render failed', err, t);
        parts.push('<div class="vf304-empty" style="text-align:left">Render error on ' +
          _vf304Esc(t.short_id || '?') + ' &mdash; check console.</div>');
      }
    });
    relHost.innerHTML = parts.join('');
  }
}

// Line-item renderer shared by all three sections.
// Uses data attributes; clicks are handled by the delegated listener below.
// opts: { linked_at, linked_by, reason, rel_id }
function vf304LineItem(t, kind, opts) {
  opts = opts || {};
  const linkedAt = opts.linked_at ? opts.linked_at.replace('T', ' ').slice(0, 16) + ' UTC' : '';
  const linkedBy = opts.linked_by || '';
  const reason = opts.reason || '';
  const descRaw = (t.description || '').trim();
  const descInner = descRaw ? (_vf304Esc(descRaw.slice(0, 240)) + (descRaw.length > 240 ? '…' : ''))
                            : '<em style="opacity:0.6">(no description)</em>';
  // Null-safe field access — an item missing status/priority must NOT throw
  // mid-render (would abort the whole map and leave the list stuck at 1 row).
  const statusRaw = t.status || '';
  const priorityRaw = t.priority || '';
  // Tooltip uses title-attribute (HTML-escaped) — full title + reason if present.
  const tipParts = [t.title || ''];
  if (reason) tipParts.push('Reason: ' + reason);
  const tip = _vf304Esc(tipParts.join(' — '));
  const relIdAttr = opts.rel_id ? ' data-rel-id="' + _vf304Esc(opts.rel_id) + '"' : '';
  return (
    '<div class="vf304-rel-row" data-kind="' + kind + '" data-task-id="' + _vf304Esc(t.id || '') + '"' + relIdAttr + ' title="' + tip + '">' +
      '<span class="caret">&#9656;</span>' +
      '<span class="rid">' + _vf304Esc(t.short_id || '?') + '</span>' +
      '<span class="rchips">' +
        '<span class="vf304-chip vf304-c-' + _vf304Esc(statusRaw) + '">' + _vf304Esc(statusRaw.replace('_',' ')) + '</span>' +
        '<span class="vf304-chip vf304-p-' + _vf304Esc(priorityRaw) + '">' + _vf304Esc(priorityRaw) + '</span>' +
      '</span>' +
      '<span class="rtitle">' + _vf304Esc(t.title || '') + '</span>' +
      '<span class="rowner">' + _vf304Esc(t.owner_label || '') + '</span>' +
      '<button type="button" class="pcd-member-remove" data-action="clear" title="' +
        (kind === 'blocked_by' ? 'Clear blocker — reason required'
         : kind === 'blocks' ? 'Unset this task as blocker — reason required'
         : 'Remove Related link — reason required') +
      '">&#10005;</button>' +
    '</div>' +
    '<div class="vf304-rel-expand">' +
      '<div class="vf304-mini-meta">' +
        (linkedAt ? '<span class="lbl">Linked at</span><span class="val">' + _vf304Esc(linkedAt) + (linkedBy ? ' &middot; by ' + _vf304Esc(linkedBy) : '') + '</span>' : '') +
        (reason ? '<span class="lbl">Reason</span><span class="val reason">' + _vf304Esc(reason) + '</span>' : '') +
      '</div>' +
      '<div class="vf304-mini-desc">' + descInner + '</div>' +
      '<button type="button" class="vf304-mini-open" data-action="open">Open in drawer &rarr;</button>' +
    '</div>'
  );
}

// Delegated click handler for the Related tab. Reads data-kind, data-task-id, data-rel-id
// off the row ancestor — avoids any onclick-string escaping pitfalls.
(function() {
  document.addEventListener('click', function(e) {
    const panel = document.getElementById('drawerRelatedPanel');
    if (!panel || !panel.contains(e.target)) return;
    const row = e.target.closest('.vf304-rel-row');
    if (!row) {
      // Might be the "Open in drawer" button inside an expanded mini-card.
      const openBtn = e.target.closest('.vf304-mini-open');
      if (openBtn) {
        e.stopPropagation();
        const sibRow = openBtn.closest('.vf304-rel-expand').previousElementSibling;
        const tid = sibRow && sibRow.dataset.taskId;
        if (tid) vf304OpenBlocker(tid);
      }
      return;
    }
    const kind = row.dataset.kind;
    const taskId = row.dataset.taskId;
    const relId = row.dataset.relId;
    // × button inside the row (shared design: .pcd-member-remove)
    const rx = e.target.closest('.pcd-member-remove');
    if (rx) {
      e.stopPropagation();
      if (kind === 'blocked_by') vf304OpenClearBlockerModal();
      else if (kind === 'blocks') vf304OpenClearReverseBlockerModal(taskId);
      else if (kind === 'related') vf304OpenRemoveRelatedModal(relId, taskId);
      return;
    }
    // Row itself (not the x, not the open btn) → toggle expand
    vf304ToggleExpand(row);
  });
})();

function vf304ToggleExpand(rowEl) {
  // Collapse any other expanded rows in the same drawer panel (accordion).
  const panel = rowEl.closest('#drawerRelatedPanel');
  if (panel) {
    panel.querySelectorAll('.vf304-rel-row.expanded').forEach(r => {
      if (r !== rowEl) r.classList.remove('expanded');
    });
  }
  rowEl.classList.toggle('expanded');
}

function vf304OpenBlocker(taskId) {
  // Swap drawer to the blocker. Same pattern as search popup.
  if (typeof window.openDrawer !== 'function') return;
  const u = new URL(window.location.href);
  u.searchParams.set('open', taskId);
  try { window.history.replaceState({}, '', u.toString()); } catch(e) {}
  window.openDrawer(taskId, null);
}

// vf304OpenBlockerPicker — legacy alias used by the sidebar chip's empty-state button.
function vf304OpenBlockerPicker() { vf304OpenPicker('blocked_by'); }

// Unified picker launcher. kind: 'blocked_by' | 'blocks' | 'related'
function vf304OpenPicker(kind) {
  if (typeof window.openTaskPicker !== 'function') {
    vfToast && vfToast('Search picker not available on this page.');
    return;
  }
  const labels = {
    blocked_by: { kicker: '// Pick a Blocker', placeholder: 'Search for the task that blocks this one…', cta: 'Set as blocker →' },
    blocks:     { kicker: '// Pick a Task to Block', placeholder: 'Search for the task this one blocks…', cta: 'Set as blocking →' },
    related:    { kicker: '// Pick a Related Task', placeholder: 'Search for a loosely related task…', cta: 'Link as related →' },
  };
  const L = labels[kind] || labels.related;
  // Build exclude list: self + already-linked tasks in this section (avoid duplicates)
  const exclude = [_drawerTaskId].filter(Boolean);
  const rel = _vf304Relationships;
  if (rel) {
    if (kind === 'blocked_by' && rel.blocked_by) exclude.push(rel.blocked_by.id);
    if (kind === 'blocks') (rel.blocks || []).forEach(t => exclude.push(t.id));
    if (kind === 'related') (rel.related || []).forEach(t => exclude.push(t.id));
  }
  window.openTaskPicker({
    kicker: L.kicker,
    placeholder: L.placeholder,
    ctaLabel: L.cta,
    excludeIds: exclude,
    openOnly: true,  // VF-320: all VF-304 pickers default to open tasks only
    onPick: function(row) {
      _vf304PendingRow = row;
      _vf304PendingKind = kind;
      vf304OpenReasonModal(kind === 'blocked_by' ? 'set'
                          : kind === 'blocks' ? 'set-reverse'
                          : 'add-related');
    },
  });
}

function vf304OpenClearBlockerModal() { vf304OpenReasonModal('clear'); }

function vf304OpenClearReverseBlockerModal(targetId) {
  // Look up the target's short_id + title from the cached relationships (Blocks list).
  const rel = _vf304Relationships || {};
  const hit = (rel.blocks || []).find(t => t.id === targetId) || {id: targetId};
  _vf304PendingRow = {id: targetId, short_id: hit.short_id || '?', title: hit.title || ''};
  vf304OpenReasonModal('clear-reverse');
}

function vf304OpenRemoveRelatedModal(relId, otherTaskId) {
  _vf304PendingRelId = relId;
  const rel = _vf304Relationships || {};
  const hit = (rel.related || []).find(t => t.id === otherTaskId) || {id: otherTaskId};
  _vf304PendingRow = {id: otherTaskId, short_id: hit.short_id || '?', title: hit.title || ''};
  vf304OpenReasonModal('remove-related');
}

function vf304OpenReasonModal(mode) {
  _vf304ReasonMode = mode;
  const ov = document.getElementById('vf304-reason-overlay');
  const modal = ov.querySelector('.vf304-reason-modal');
  const kicker = document.getElementById('vf304ReasonKicker');
  const title = document.getElementById('vf304ReasonTitle');
  const sub = document.getElementById('vf304ReasonSub');
  const input = document.getElementById('vf304ReasonInput');
  const submit = document.getElementById('vf304ReasonSubmit');
  const err = document.getElementById('vf304ReasonErr');
  err.classList.remove('show'); err.innerHTML = '';
  input.value = '';
  submit.disabled = true;
  // Danger styling (red) only for clears. Sets / adds use accent hue (violet etc per user --hue).
  const isDanger = (mode === 'clear' || mode === 'clear-reverse' || mode === 'remove-related');
  modal.classList.toggle('vf304-danger', isDanger);

  const r = _vf304PendingRow;
  const bb = (_vf304Relationships && _vf304Relationships.blocked_by) || null;
  if (mode === 'set') {
    kicker.textContent = '// Set Blocked-By';
    title.textContent = 'Set this task to be blocked by ' + (r ? r.short_id : '?');
    sub.innerHTML = r ? ('New blocker: <strong>' + _vf304Esc(r.short_id) + '</strong> &middot; ' + _vf304Esc(r.title)) : '';
    submit.textContent = 'Set blocker';
    input.placeholder = "Why is this dependency being introduced?";
  } else if (mode === 'set-reverse') {
    kicker.textContent = '// Set Blocks';
    title.textContent = 'Set ' + (r ? r.short_id : '?') + ' to be blocked by THIS task';
    sub.innerHTML = r ? ('Target: <strong>' + _vf304Esc(r.short_id) + '</strong> &middot; ' + _vf304Esc(r.title)) : '';
    submit.textContent = 'Set as blocker for target';
    input.placeholder = "Why does this task block the target?";
  } else if (mode === 'add-related') {
    kicker.textContent = '// Link as Related';
    title.textContent = 'Link with ' + (r ? r.short_id : '?') + ' as Related';
    sub.innerHTML = r ? ('Other task: <strong>' + _vf304Esc(r.short_id) + '</strong> &middot; ' + _vf304Esc(r.title)) : '';
    submit.textContent = 'Link as related';
    input.placeholder = "Why are these tasks related?";
  } else if (mode === 'clear') {
    kicker.textContent = '// Clear Blocked-By';
    title.textContent = 'Clear blocked-by link?';
    sub.innerHTML = bb ? ('Current blocker: <strong>' + _vf304Esc(bb.short_id) + '</strong> &middot; ' + _vf304Esc(bb.title)) : '';
    submit.textContent = 'Clear blocked-by';
    input.placeholder = "Why is this link being cleared?";
  } else if (mode === 'clear-reverse') {
    kicker.textContent = '// Clear Blocks';
    title.textContent = 'Unset THIS task as the blocker of ' + (r ? r.short_id : '?');
    sub.innerHTML = r ? ('Target: <strong>' + _vf304Esc(r.short_id) + '</strong> &middot; ' + _vf304Esc(r.title)) : '';
    submit.textContent = 'Clear';
    input.placeholder = "Why is this being cleared?";
  } else if (mode === 'remove-related') {
    kicker.textContent = '// Remove Related';
    title.textContent = 'Unlink Related with ' + (r ? r.short_id : '?');
    sub.innerHTML = r ? ('Other task: <strong>' + _vf304Esc(r.short_id) + '</strong> &middot; ' + _vf304Esc(r.title)) : '';
    submit.textContent = 'Remove link';
    input.placeholder = "Why is this link being removed?";
  }
  ov.classList.add('open');
  setTimeout(() => input.focus(), 40);
}

function vf304CloseReason() {
  document.getElementById('vf304-reason-overlay').classList.remove('open');
  _vf304ReasonMode = null;
  _vf304PendingRow = null;
  _vf304PendingKind = null;
  _vf304PendingRelId = null;
}

function vf304ReasonOnInput() {
  const input = document.getElementById('vf304ReasonInput');
  const submit = document.getElementById('vf304ReasonSubmit');
  submit.disabled = (input.value || '').trim().length < 10;
}

// Extract the { message, code, pivot_hint } from a response error body.
function _vf304ParseError(d, status) {
  const detail = d && d.detail;
  if (typeof detail === 'object' && detail) {
    return { message: detail.message || detail.code || ('HTTP ' + status), code: detail.code, raw: detail };
  }
  return { message: (typeof detail === 'string' ? detail : 'HTTP ' + status), code: null, raw: null };
}

async function vf304SubmitReason() {
  const input = document.getElementById('vf304ReasonInput');
  const err = document.getElementById('vf304ReasonErr');
  const submit = document.getElementById('vf304ReasonSubmit');
  const reason = (input.value || '').trim();
  if (reason.length < 10) return;
  submit.disabled = true;
  const mode = _vf304ReasonMode;
  const row = _vf304PendingRow;

  // Route to the right endpoint/method/body per mode.
  let endpoint, method, body;
  if (mode === 'set' || mode === 'clear') {
    endpoint = '/api/v2/tasks/' + _drawerTaskId;
    method = 'PATCH';
    body = {
      blocked_by_task_id: mode === 'clear' ? '' : (row ? row.id : ''),
      blocked_by_reason: reason,
    };
  } else if (mode === 'set-reverse') {
    endpoint = '/api/v2/tasks/' + _drawerTaskId + '/blocks';
    method = 'POST';
    body = { target_task_id: row.id, reason: reason };
  } else if (mode === 'clear-reverse') {
    // Clearing a "blocks" relationship = PATCHing the TARGET task's blocked_by to null.
    endpoint = '/api/v2/tasks/' + row.id;
    method = 'PATCH';
    body = { blocked_by_task_id: '', blocked_by_reason: reason };
  } else if (mode === 'add-related') {
    endpoint = '/api/v2/tasks/' + _drawerTaskId + '/related';
    method = 'POST';
    body = { other_task_id: row.id, reason: reason };
  } else if (mode === 'remove-related') {
    endpoint = '/api/v2/tasks/' + _drawerTaskId + '/related/' + _vf304PendingRelId;
    method = 'DELETE';
    body = { reason: reason };
  }

  try {
    const r = await fetch(endpoint, {
      method: method,
      headers: {'Content-Type': 'application/json'},
      credentials: 'same-origin',
      body: (method === 'PATCH' || method === 'POST' || method === 'DELETE') ? JSON.stringify(body) : undefined,
    });
    if (!r.ok) {
      const d = await r.json().catch(()=>({}));
      const parsed = _vf304ParseError(d, r.status);
      // Conflict pivot: if trying to set reverse-blocks but target already has a blocker,
      // offer Related as an alternative (PK's "A with a twist" decision).
      if (parsed.code === 'BLOCKED_BY_TARGET_HAS_BLOCKER' && mode === 'set-reverse') {
        const hint = 'VF-304 preserves the 1:1 blocked_by invariant. Linking as <strong>Related</strong> captures the association without displacing the existing blocker.';
        err.innerHTML = _vf304Esc(parsed.message) + '<br><br>' + hint + ' <a href="#" class="pivot-btn" onclick="event.preventDefault();vf304PivotToRelated()">Link as Related instead &rarr;</a>';
        err.classList.add('show');
        submit.disabled = false;
        return;
      }
      err.textContent = parsed.message;
      err.classList.add('show');
      submit.disabled = false;
      return;
    }
    vf304CloseReason();
    await vf304LoadRelationships();
    if (typeof vfToast === 'function') {
      const okMsg = {
        'set': 'Blocked-by set',
        'clear': 'Blocked-by cleared',
        'set-reverse': 'Blocks target set',
        'clear-reverse': 'Blocks cleared',
        'add-related': 'Related link added',
        'remove-related': 'Related link removed',
      }[mode] || 'Saved';
      vfToast(okMsg, 'success');
    }
  } catch(e) {
    err.textContent = 'Network error: ' + (e.message || e);
    err.classList.add('show');
    submit.disabled = false;
  }
}

// Pivot from "set blocks" rejected by target-has-blocker → offer Related.
// Re-opens the reason modal in add-related mode with the same reason preserved.
function vf304PivotToRelated() {
  const input = document.getElementById('vf304ReasonInput');
  const savedReason = (input.value || '').trim();
  const row = _vf304PendingRow;
  _vf304ReasonMode = 'add-related';
  _vf304PendingKind = 'related';
  vf304OpenReasonModal('add-related');
  // Re-populate reason (user already wrote one)
  const newInput = document.getElementById('vf304ReasonInput');
  newInput.value = savedReason;
  vf304ReasonOnInput();
}

// Hook: after openDrawer loads, refresh relationships for the new task.
// We rely on the existing openDrawer wiring to trigger the task fetch; we piggyback.
(function() {
  if (typeof window.openDrawer !== 'function') return;
  const origOpen = window.openDrawer;
  window.openDrawer = function(taskId, sourceEl) {
    const r = origOpen.apply(this, arguments);
    // Fire relationships fetch after the main load settles
    setTimeout(() => vf304LoadRelationships(), 400);
    return r;
  };
})();
