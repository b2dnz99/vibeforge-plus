<!DOCTYPE html>
<html lang="en">
<script>(function(){try{var p=JSON.parse(localStorage.getItem('vf-theme')||'{}');if(p.dark)document.documentElement.setAttribute('data-theme','dark');else document.documentElement.setAttribute('data-theme','light');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})()</script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibeForge+ — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:linear-gradient(145deg,#0f172a,#1e1b4b);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;color:#e2e8f0}
  [data-theme="light"] body{background:linear-gradient(145deg,#f8fafc,#e2e8f0)}
  [data-theme="light"] .login-card{background:rgba(255,255,255,0.95);border-color:rgba(124,58,237,0.12);box-shadow:0 8px 48px rgba(0,0,0,0.1)}
  [data-theme="light"] .field input{background:rgba(248,250,252,0.8);border-color:rgba(124,58,237,0.15);color:#1e293b}
  [data-theme="light"] .login-header h1{color:#6d28d9}
  [data-theme="light"] .login-header p{color:#94a3b8}
  [data-theme="light"] .field label{color:#6d28d9}
  [data-theme="light"] .login-footer p{color:#94a3b8}

  .login-card{width:100%;max-width:420px;background:rgba(15,23,42,0.9);backdrop-filter:blur(20px);border-radius:16px;box-shadow:0 8px 48px rgba(0,0,0,0.5),0 0 80px rgba(124,58,237,0.06);border:1px solid rgba(124,58,237,0.18);overflow:hidden}

  .topbar{height:3px;background:linear-gradient(90deg,transparent,#7c3aed,#38bdf8,#7c3aed,transparent)}

  .login-header{padding:2rem 2rem 1rem;text-align:center}
  .login-header h1{font-size:1.3rem;font-weight:700;color:#f1f5f9;text-shadow:0 0 20px rgba(124,58,237,0.3);margin-bottom:0.3rem}
  .login-header p{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:#475569;text-transform:uppercase;letter-spacing:0.1em}

  .radar{width:48px;height:48px;border-radius:50%;border:2px solid rgba(124,58,237,0.35);position:relative;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem}
  .radar::before{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#7c3aed;box-shadow:0 0 12px #7c3aed,0 0 24px rgba(124,58,237,0.3);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}

  .login-body{padding:0 2rem 2rem}

  .field{margin-bottom:1rem}
  .field label{font-family:'JetBrains Mono',monospace;font-size:0.6rem;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:#7c3aed;display:block;margin-bottom:0.3rem}
  .field input{width:100%;padding:0.6rem 0.75rem;border-radius:8px;border:1px solid rgba(124,58,237,0.2);background:rgba(15,23,42,0.6);font-family:'JetBrains Mono',monospace;font-size:0.85rem;color:#e2e8f0;outline:none;transition:border-color 0.15s,box-shadow 0.15s}
  .field input:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,0.15)}
  .field input::placeholder{color:#475569}

  .login-btn{width:100%;padding:0.65rem;border:none;border-radius:8px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.05em;cursor:pointer;transition:all 0.2s;margin-top:0.5rem}
  .login-btn:hover{box-shadow:0 4px 20px rgba(124,58,237,0.4)}
  .login-btn:disabled{opacity:0.5;cursor:not-allowed}

  .error-msg{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:#ef4444;text-align:center;margin-top:0.75rem;min-height:1rem;padding:0.3rem;border-radius:6px;display:none}
  .error-msg.visible{display:block;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15)}

  /* VF-317: structured CTA chip for SA-at-board-door */
  .sa-block-chip{display:none;margin-top:0.5rem;padding:0.6rem 0.75rem;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.3);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:#fca5a5;line-height:1.5;text-align:left}
  .sa-block-chip.visible{display:block}
  .sa-block-chip .head{color:#ef4444;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;font-size:0.55rem;margin-bottom:0.3rem}
  .sa-block-chip a.go{display:inline-flex;align-items:center;gap:0.3rem;margin-top:0.4rem;padding:0.3rem 0.7rem;font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:#ef4444;text-decoration:none;border:1px solid rgba(239,68,68,0.4);border-radius:4px;background:rgba(239,68,68,0.1)}
  .sa-block-chip a.go:hover{background:rgba(239,68,68,0.2)}

  .login-footer{padding:0 2rem 1.5rem;text-align:center}
  .login-footer p{font-family:'JetBrains Mono',monospace;font-size:0.55rem;color:#475569;line-height:1.6}
</style>
</head>
<body>
<div class="login-card">
  <div class="topbar"></div>
  <div class="login-header">
    <div class="radar"></div>
    <h1>VibeForge+</h1>
    <p>// Mission Control — Sign In</p>
  </div>
  <div class="login-body">
    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="field">
        <label for="loginEmail">// Username</label>
        <input type="text" id="loginEmail" name="email" placeholder="username" autofocus required>
      </div>
      <div class="field">
        <label for="loginPass">// Password</label>
        <style>#loginPass::-ms-reveal,#loginPass::-webkit-credentials-auto-fill-button{display:none !important}</style>
        <div style="display:flex;align-items:center;gap:0.75rem">
          <input type="password" id="loginPass" name="password" placeholder="Enter password" required autocomplete="off" style="flex:1">
          <button type="button" onclick="var e=document.getElementById('loginPass');e.type=e.type==='password'?'text':'password';this.style.opacity=e.type==='text'?'1':'0.4'" style="background:none;border:none;cursor:pointer;font-size:1.3rem;color:#7c3aed;opacity:0.4;transition:opacity 0.15s;flex-shrink:0;filter:drop-shadow(0 0 3px rgba(124,58,237,0.3))" title="Show/hide">&#128065;</button>
        </div>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">Authenticate</button>
    </form>
    <div class="error-msg" id="loginError"></div>
    <!-- VF-317: SA-at-board-door redirect chip (shown when backend returns SA_LOGIN_BLOCKED) -->
    <div class="sa-block-chip" id="saBlockChip">
      <div class="head">&#128274; Super Admin account detected</div>
      <span id="saBlockMsg"></span>
      <div><a id="saBlockLink" href="/admin/login" class="go">Open Admin Panel <span>&rarr;</span></a></div>
    </div>
  </div>
  <div class="login-footer">
    <p>Forgot your password? Ask your Admin or Super Admin to reset it.</p>
  </div>
</div>

<script>
function doLogin(e) {
  e.preventDefault();
  var btn = document.getElementById('loginBtn');
  var err = document.getElementById('loginError');
  btn.disabled = true;
  btn.textContent = 'Authenticating...';
  err.classList.remove('visible');

  // VF-317: hide any SA chip leftover from a prior attempt
  document.getElementById('saBlockChip').classList.remove('visible');

  fetch('/ui/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email: document.getElementById('loginEmail').value.trim(),
      password: document.getElementById('loginPass').value,
    }),
  }).then(r => {
    if (r.ok) {
      return r.json().then(function(d) { window.location.href = d.redirect || '/ui/'; });
    } else {
      return r.json().then(d => {
        // VF-317: structured SA-blocked → render CTA chip instead of plain error
        var det = d.detail;
        if (det && typeof det === 'object' && det.code === 'SA_LOGIN_BLOCKED') {
          document.getElementById('saBlockMsg').textContent = det.message || '';
          document.getElementById('saBlockLink').href = det.admin_login_url || '/admin/login';
          document.getElementById('saBlockChip').classList.add('visible');
        } else {
          err.textContent = (typeof det === 'string' ? det : (det && det.message) || 'Authentication failed');
          err.classList.add('visible');
        }
        btn.disabled = false;
        btn.textContent = 'Authenticate';
      });
    }
  }).catch(() => {
    err.textContent = 'Connection error';
    err.classList.add('visible');
    btn.disabled = false;
    btn.textContent = 'Authenticate';
  });
}
</script>
</body>
</html>
